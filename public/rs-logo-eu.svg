<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" role="img" aria-labelledby="rsLogoTitle">
  <title id="rsLogoTitle">Recrute Stagiaire</title>
  <defs>
    <radialGradient id="rsGlobe" cx="38%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#5b86e5"/>
      <stop offset="45%" stop-color="#0033ab"/>
      <stop offset="100%" stop-color="#001a57"/>
    </radialGradient>
    <linearGradient id="rsWingL" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
    <linearGradient id="rsWingR" x1="100%" y1="50%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ffcc00"/>
    </linearGradient>
  </defs>
  <!-- Yellow wing shapes (EU gold), blue globe -->
  <ellipse cx="68" cy="102" rx="44" ry="86" fill="url(#rsWingL)" transform="rotate(-18 68 102)" opacity="0.95"/>
  <ellipse cx="172" cy="102" rx="44" ry="86" fill="url(#rsWingR)" transform="rotate(18 172 102)" opacity="0.95"/>
  <circle cx="120" cy="100" r="78" fill="url(#rsGlobe)"/>
  <ellipse cx="118" cy="88" rx="36" ry="22" fill="#ffffff" opacity="0.22"/>
  <!-- Letters RS -->
  <text x="120" y="122" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff" stroke="#d1d5db" stroke-width="0.5" paint-order="stroke fill">RS</text>
</svg>

